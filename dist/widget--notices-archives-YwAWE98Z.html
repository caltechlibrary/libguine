<div id="notices-archives-YwAWE98Z" aria-live="polite"></div>
<!-- learned from https://stackoverflow.com/a/66625405 -->
<script>
  async function fetchNotices() {
    try {
      let response = await fetch('https://caltechlibrary.github.io/libguine/notices/archives.html');
      document.getElementById('notices-archives-YwAWE98Z').innerHTML = await response.text();
    } catch (e) {
      console.log('fetchNotices error:' + e);
    }
  }
  fetchNotices();
</script>
